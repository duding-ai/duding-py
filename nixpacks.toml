# nixpacks.toml — Railway build config for Playwright/Chromium support

[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "nspr",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "mesa",
  "expat",
  "dbus",
  "cups",
  "libdrm",
  "at-spi2-core",
  "gtk3",
  "pango",
  "cairo",
  "glib",
  "alsa-lib",
  "fontconfig",
  "freetype",
  "xorg.libXtst",
  "libgbm"
]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "uvicorn app:app --host 0.0.0.0 --port $PORT"
