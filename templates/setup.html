{% extends "base.html" %}
{% block title %}Setup — {{ brand.name }}{% endblock %}
{% block content %}
<h2 class="page-title">Create Admin</h2>
<form method="post" action="/setup" class="card form" style="max-width:420px;">
    <div>
        <div class="label">Username</div>
        <input class="input" name="username" required />
    </div>
    <div>
        <div class="label">Password</div>
        <input class="input" name="password" required />
    </div>
    <button class="btn-primary">Create</button>
</form>
{% endblock %}
