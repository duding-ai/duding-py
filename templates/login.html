{% extends "base.html" %}
{% block title %}Login — Duding{% endblock %}
{% block content %}
<section class="lead">
    <div class="wrap" style="max-width:720px">
        {% if error %}<div class="banner danger">Invalid credentials.</div>{% endif %}
        <h2 class="lead-title">Admin Login</h2>
        <form method="post" action="/login" class="lead-form">
            <div class="grid" style="grid-template-columns:1fr; max-width:400px; gap:10px;">
                <input class="field" name="email" type="email" placeholder="Email" required />
                <input class="field" type="password" name="password" placeholder="Password" required />
            </div>
            <button class="btn btn-primary btn-wide" type="submit" style="max-width:400px; margin-top:4px;">Sign in</button>
        </form>
    </div>
</section>
{% endblock %}
