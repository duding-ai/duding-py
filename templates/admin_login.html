<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Duding — Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="/static/css/styles.css" rel="stylesheet" />
    <style>
        .wrap {
            max-width: 480px;
            margin: 80px auto;
            padding: 24px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .06)
        }

        .field {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 10px
        }

        .btn {
            padding: 12px 16px;
            border-radius: 12px;
            border: 0;
            background: black;
            color: #fff;
            cursor: pointer
        }

        .error {
            background: #ffe8e8;
            color: #b00020;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 12px
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h2>Admin Login</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="post" action="/admin_login">
            <input type="hidden" name="next" value="{{ next }}" />
            <p><input class="field" name="username" placeholder="Username" autocomplete="username" /></p>
            <p><input class="field" name="password" type="password" placeholder="Password"
                    autocomplete="current-password" /></p>
            <p><button class="btn" type="submit">Sign In</button></p>
        </form>
        <p style="font-size:13px;color:#666">Default: admin / admin123 (override via <code>ADMIN_USER</code> /
            <code>ADMIN_PASS</code>)</p>
    </div>
</body>

</html>
